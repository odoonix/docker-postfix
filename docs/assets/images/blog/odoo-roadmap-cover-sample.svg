<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Odoo Roadmap Cover Sample</title>
  <desc id="desc">Sample cover image for the Odoo roadmap blog post.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2540"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="90" y="110" width="1420" height="680" rx="30" fill="#0f172a" opacity="0.85"/>
  <rect x="90" y="110" width="1420" height="12" rx="6" fill="url(#accent)"/>

  <circle cx="1370" cy="210" r="170" fill="#111827" opacity="0.35"/>
  <circle cx="250" cy="720" r="210" fill="#111827" opacity="0.3"/>

  <text x="170" y="300" fill="#f8fafc" font-size="74" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Roadmap for Odoo
  </text>
  <text x="170" y="380" fill="#94a3b8" font-size="36" font-family="Segoe UI, Arial, sans-serif">
    Postfix + FastAPI + Odoo Email Gateway Vision
  </text>

  <rect x="170" y="455" width="500" height="76" rx="12" fill="#111827"/>
  <text x="205" y="504" fill="#fcd34d" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="600">
    Sample Blog Cover
  </text>

  <text x="170" y="628" fill="#94a3b8" font-size="28" font-family="Segoe UI, Arial, sans-serif">
    docs/assets/images/blog/odoo-roadmap-cover-sample.svg
  </text>
</svg>
