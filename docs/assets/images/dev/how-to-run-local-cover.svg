<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Local Documentation Development Cover</title>
  <desc id="desc">Cover image for how to run local Jekyll documentation server.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#1f3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="90" y="110" width="1420" height="680" rx="30" fill="#0f172a" opacity="0.86"/>
  <rect x="90" y="110" width="1420" height="14" rx="7" fill="url(#accent)"/>

  <circle cx="1310" cy="210" r="200" fill="#0b1220" opacity="0.35"/>
  <circle cx="240" cy="730" r="230" fill="#0b1220" opacity="0.28"/>

  <text x="170" y="305" fill="#e2e8f0" font-size="68" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Local Documentation Development
  </text>
  <text x="170" y="385" fill="#93c5fd" font-size="36" font-family="Segoe UI, Arial, sans-serif">
    Jekyll Setup, Run, Build, and Test Guide
  </text>

  <rect x="170" y="460" width="520" height="78" rx="12" fill="#111827"/>
  <text x="205" y="510" fill="#86efac" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="600">
    Project Dev Guide Cover
  </text>

  <text x="170" y="635" fill="#94a3b8" font-size="27" font-family="Segoe UI, Arial, sans-serif">
    docs/assets/images/dev/how-to-run-local-cover.svg
  </text>
</svg>
